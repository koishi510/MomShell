default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=10000"]

  - repo: local
    hooks:
      - id: vue-eslint
        name: Vue ESLint
        entry: bash -c 'cd frontend.new && npm run lint'
        language: system
        files: ^frontend\.new/.*\.(ts|vue|js)$
        pass_filenames: false

      - id: vue-typecheck
        name: Vue typecheck
        entry: bash -c 'cd frontend.new && npm run typecheck'
        language: system
        files: ^frontend\.new/.*\.(ts|vue)$
        pass_filenames: false

      - id: go-fmt-check
        name: Go format check
        entry: bash -c 'cd backend.new && test -z "$(gofmt -l .)"'
        language: system
        files: ^backend\.new/.*\.go$
        pass_filenames: false

      - id: go-vet
        name: Go vet
        entry: bash -c 'cd backend.new && go vet ./...'
        language: system
        files: ^backend\.new/.*\.go$
        pass_filenames: false

      - id: go-build
        name: Go build
        entry: bash -c 'cd backend.new && go build ./...'
        language: system
        files: ^backend\.new/.*\.go$
        pass_filenames: false
