name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  frontend-cq:
    name: Frontend Code Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend.new

    steps:
      - uses: actions/checkout@v6

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: "npm"
          cache-dependency-path: frontend.new/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  go-cq:
    name: Go Code Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend.new

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend.new/go.mod
          cache-dependency-path: backend.new/go.sum

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend.new

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
