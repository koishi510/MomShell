sonar.projectKey=koishi510_MomShell
sonar.organization=koishi510

sonar.sources=backend,frontend/src
sonar.tests=backend
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/node_modules/**,frontend/dist/**,backend/internal/admin/**

# Exclude frontend and DB-coupled backend code from coverage analysis
# Frontend: no test framework configured yet
# Repository/service/handler: require database integration tests
sonar.coverage.exclusions=frontend/src/**,\
  backend/internal/repository/**,\
  backend/internal/service/**,\
  backend/internal/handler/**,\
  backend/internal/middleware/**,\
  backend/internal/router/**,\
  backend/internal/database/**,\
  backend/internal/scheduler/**,\
  backend/internal/config/**,\
  backend/internal/admin/**,\
  backend/cmd/**

# Go coverage report (generated by go test -coverprofile)
sonar.go.coverage.reportPaths=backend/coverage.out

# Ignore React Hook rule (typescript:S6440) on Vue files — false positive
# Vue composables (useXxx) follow the same naming convention as React Hooks
# but are valid at the top level of <script setup> blocks and composable functions
sonar.issue.ignore.multicriteria=vue1,ts1
sonar.issue.ignore.multicriteria.vue1.ruleKey=typescript:S6440
sonar.issue.ignore.multicriteria.vue1.resourceKey=frontend/src/**/*.vue
sonar.issue.ignore.multicriteria.ts1.ruleKey=typescript:S6440
sonar.issue.ignore.multicriteria.ts1.resourceKey=frontend/src/**/*.ts
